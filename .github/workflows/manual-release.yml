name: 手動リリース

on:
  workflow_dispatch:
    inputs:
      version:
        description: "リリースバージョン (例: 1.2.3 または 1.2.3-beta.1)"
        required: true
        type: string
      create_tag:
        description: "タグを自動作成する"
        required: true
        type: boolean
        default: true
      dry_run:
        description: "ドライラン (NuGet への発行をスキップ)"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  DOTNET_NOLOGO: "1"

jobs:
  manual-release:
    name: 手動リリース実行
    runs-on: ubuntu-latest
    environment: nuget-release
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        shell: bash

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 入力値を確認
        run: |
          echo "バージョン    : ${{ inputs.version }}"
          echo "タグ自動作成  : ${{ inputs.create_tag }}"
          echo "ドライラン    : ${{ inputs.dry_run }}"

      - name: .NET SDK をセットアップ
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: 依存パッケージを復元
        run: dotnet restore Telemetria.slnx

      - name: ソリューションをビルド
        run: |
          dotnet build Telemetria.slnx -c Release --no-restore \
            -p:Version=${{ inputs.version }}

      - name: 全テストを実行
        run: |
          dotnet test Telemetria.slnx -c Release --no-build \
            --logger "trx;LogFileName=results.trx" \
            --results-directory ./test-results

      - name: NuGet パッケージを作成
        run: |
          dotnet pack src/Telemetria/Telemetria.csproj -c Release --no-build \
            -p:Version=${{ inputs.version }} \
            --output ./artifacts

      - name: 作成されたパッケージ一覧を表示
        run: ls -la ./artifacts/

      - name: Trusted Publishing 用トークン交換エンドポイントを探索して API キーを取得
        if: ${{ !inputs.dry_run }}
        id: nuget-token
        uses: actions/github-script@v7
        with:
          script: |
            const idToken = await core.getIDToken('api://AzureADTokenExchange');
            core.setSecret(idToken);
            core.info('GitHub OIDC トークンの取得に成功しました');

            const candidates = [
              'https://www.nuget.org/api/v1/authentication/authenticate',
              'https://www.nuget.org/api/v2/authentication/authenticate',
              'https://www.nuget.org/api/v1/authentication/oidc',
              'https://www.nuget.org/api/v1/authentication/github',
              'https://www.nuget.org/api/v1/trustedpublishing/authenticate',
              'https://www.nuget.org/api/v1/publish/authenticate',
              'https://www.nuget.org/api/v1/authentication/minttoken',
            ];

            let apiKey = null;
            for (const endpoint of candidates) {
              core.info(`試行中: POST ${endpoint}`);
              const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ oidcToken: idToken }),
              });
              core.info(`  → ステータス: ${res.status}`);

              if (res.ok) {
                const data = await res.json();
                apiKey = data.tokenValue;
                core.setSecret(apiKey);
                core.info(`  → 成功: ${endpoint}`);
                break;
              }

              if (res.status !== 404) {
                const body = await res.text();
                core.info(`  → 応答本文: ${body}`);
              }
            }

            if (!apiKey) {
              core.setFailed('すべての候補エンドポイントで認証に失敗しました。ログを確認してください。');
              return;
            }

            core.setOutput('token', apiKey);

      - name: NuGet.org へ発行 (ドライランでない場合のみ)
        if: ${{ !inputs.dry_run }}
        run: |
          dotnet nuget push ./artifacts/Telemetria.*.nupkg \
            --api-key ${{ steps.nuget-token.outputs.token }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push ./artifacts/Telemetria.*.snupkg \
            --api-key ${{ steps.nuget-token.outputs.token }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate || true

      - name: ドライランのため発行をスキップ
        if: ${{ inputs.dry_run }}
        run: echo "ドライランのため NuGet.org への発行をスキップしました"

      - name: タグを作成して push
        if: ${{ inputs.create_tag && !inputs.dry_run }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: GitHub Release を作成
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          name: "Telemetria ${{ inputs.version }}"
          generate_release_notes: true
          prerelease: ${{ contains(inputs.version, '-') }}
          files: |
            artifacts/Telemetria.*.nupkg
            artifacts/Telemetria.*.snupkg

      - name: パッケージをアーティファクトとして保存
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ inputs.version }}
          path: artifacts/
          retention-days: 90
