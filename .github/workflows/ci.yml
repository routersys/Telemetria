name: CI

on:
  push:
    branches: ["main", "develop"]
    paths-ignore:
      - "*.md"
      - "docs/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "*.md"
      - "docs/**"

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  DOTNET_NOLOGO: "1"

jobs:
  build-and-test:
    name: ビルドとテスト (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: .NET SDK をセットアップ
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: 依存パッケージを復元
        run: dotnet restore Telemetria.sln

      - name: ソリューションをビルド
        run: dotnet build Telemetria.sln -c Release --no-restore

      - name: テストを実行
        run: |
          dotnet test Telemetria.sln -c Release --no-build \
            --logger "trx;LogFileName=results.trx" \
            --results-directory ./test-results

      - name: テスト結果をアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: test-results/
          retention-days: 7

      - name: パッケージが正常に作成されるか確認
        run: dotnet pack src/Telemetria/Telemetria.csproj -c Release --no-build
